name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Build
        run: |
          bun install
          bun run build

      - name: Package
        run: |
          mkdir beautiful-mermaid
          cp main.js manifest.json styles.css beautiful-mermaid/
          zip -r beautiful-mermaid-${{ github.ref_name }}.zip beautiful-mermaid/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            beautiful-mermaid-${{ github.ref_name }}.zip
            main.js
            manifest.json
            styles.css
